<!DOCTYPE html>
<html>
<head>
  <title>Graph Visualizer</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    #mynetwork {
      width: 100%;
      height: 500px;
      border: 1px solid lightgray;
    }
  </style>
</head>
<body>

<h2>Nhập đồ thị</h2>

<textarea id="input" rows="5" cols="40">
1 2
2 3
3 4
1 4
</textarea><br><br>

<button onclick="drawGraph()">Vẽ đồ thị</button>

<div id="mynetwork"></div>

<script>
function drawGraph() {
    let input = document.getElementById("input").value.trim().split("\n");

    let nodesSet = new Set();
    let edges = [];

    input.forEach(line => {
        let [u, v] = line.split(" ").map(Number);
        nodesSet.add(u);
        nodesSet.add(v);
        edges.push({ from: u, to: v });
    });

    let nodes = Array.from(nodesSet).map(x => ({ id: x, label: x.toString() }));

    let container = document.getElementById("mynetwork");

    let data = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
    };

    let options = {
        edges: {
            arrows: "to"
        },
        physics: {
            enabled: true
        }
    };

    new vis.Network(container, data, options);
}
</script>

</body>
</html>
